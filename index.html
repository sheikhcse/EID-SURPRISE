<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#07111d,#10203a);
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#ffd369;
font-weight:bold;
cursor:pointer;
margin:10px;
}

.hidden{
display:none;
}

#giftBox{
font-size:120px;
cursor:pointer;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.popupBox{
background:#10203a;
padding:40px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Eid Surprise 🌙</h1>

<div id="countdown"></div>

<div id="lockedBox">

<p>Surprise locked. Admin unlock korle open hobe.</p>

<button onclick="openSurprise()">Open Eid Surprise</button>

<div id="status"></div>

</div>

<div id="giftSection" class="hidden">

<h2>Eid Mubarak 🎉</h2>

<div id="giftBox">🎁</div>

<p>Click the gift</p>

</div>

</div>

<div id="popup" class="hidden">

<div class="popupBox">

<h2>Eid Mubarak ✨</h2>

<p>Special surprise unlocked</p>

<button onclick="closePopup()">Close</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCMQgtwUGSuwWPH2ZnI1Ihp6XKcxop_FI90E",
authDomain: "eid-surprise-6f2c0.firebaseapp.com",
databaseURL: "https://eid-surprise-6f2c0-default-rtdb.firebaseio.com",
projectId: "eid-surprise-6f2c0",
storageBucket: "eid-surprise-6f2c0.firebasestorage.app",
messagingSenderId: "618352884835",
appId: "1:618352884835:web:01166b60d1c62ce1e4c56"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const unlockRef = ref(db,"eid2026/chandRaatUnlocked");

let unlocked=false;

onValue(unlockRef,(snap)=>{

unlocked=snap.val()===true;

if(unlocked){
document.getElementById("status").innerText="Unlocked by admin 🌙";
}
else{
document.getElementById("status").innerText="Still locked 🔒";
}

});

window.openSurprise=function(){

if(unlocked){

document.getElementById("giftSection").classList.remove("hidden")

}

else{

document.getElementById("status").innerText="Admin unlock korle open hobe"

}

}

window.closePopup=function(){

document.getElementById("popup").classList.add("hidden")

}

document.getElementById("giftBox").onclick=function(){

document.getElementById("popup").classList.remove("hidden")

confetti({

particleCount:200,
spread:120

})

}

const eidDate=new Date("2026-03-21T18:00:00")

function updateCountdown(){

const now=new Date()

const diff=eidDate-now

if(diff<0){

document.getElementById("countdown").innerText="Chand Raat 🌙"

return

}

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

document.getElementById("countdown").innerText=d+"d "+h+"h "+m+"m "+s+"s"

}

setInterval(updateCountdown,1000)

</script>

</body>
</html>
